<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline · PushupArena</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(120% 120% at 50% 0%, #161d36 0%, #0b1020 60%);
        color: #e2e8f0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 380px;
        background: rgba(22, 29, 54, 0.7);
        border: 1px solid #1f2844;
        border-radius: 20px;
        padding: 32px 24px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      }
      .logo {
        width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 16px;
        background: linear-gradient(135deg, #818cf8, #4f46e5);
        display: flex; align-items: center; justify-content: center;
        font-size: 30px;
      }
      h1 { font-size: 1.25rem; margin: 0 0 8px; }
      p { color: #94a3b8; line-height: 1.5; margin: 0 0 20px; }
      button {
        background: #4f46e5; color: white; border: 0; border-radius: 12px;
        padding: 12px 20px; font-size: 1rem; font-weight: 600; cursor: pointer;
      }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">🏋️</div>
      <h1>Du bist offline</h1>
      <p>
        PushupArena braucht für diese Ansicht eine Internetverbindung. Bereits geladene
        Inhalte bleiben verfügbar. Sobald du wieder online bist, kannst du normal weitermachen.
      </p>
      <button onclick="location.reload()">Erneut versuchen</button>
    </div>
  </body>
</html>
