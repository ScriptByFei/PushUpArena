[build]
  command = "npm run build"
  publish = "dist"

# SPA-Fallback: clientseitiges Routing (React Router) auf index.html.
# Vorhandene Dateien (Assets, sw.js, manifest) werden zuerst ausgeliefert.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Gehashte JS/CSS-Assets dürfen dauerhaft gecacht werden (Dateiname ändert sich bei Änderung).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
